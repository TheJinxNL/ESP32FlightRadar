; ESP32 Round Display — Airplane Radar
; Board: ESP32-2424S012 (ESP32-C3-MINI-1U + GC9A01 1.28" 240x240)

[env:esp32-c3-devkitm-1]
platform               = espressif32
board                  = esp32-c3-devkitm-1
framework              = arduino
board_build.partitions = min_spiffs.csv

monitor_speed          = 115200
upload_speed           = 921600

; Place lv_conf.h next to src/ so LVGL finds it with LV_CONF_INCLUDE_SIMPLE
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -I src

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    lvgl/lvgl @ ^8.4.0
    bblanchon/ArduinoJson @ ^7.1.0
    tzapu/WiFiManager @ ^2.0.17
    bodmer/TJpg_Decoder @ ^1.1.0
